# /etc/nginx/sites-available/rr-jewellers
# Ubuntu Mumbai VPS — WebSocket proxy for RR Jewellers v17
#
# Setup:
#   sudo cp nginx.conf /etc/nginx/sites-available/rr-jewellers
#   sudo ln -s /etc/nginx/sites-available/rr-jewellers /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    # Redirect to HTTPS (uncomment after SSL setup)
    # return 301 https://$host$request_uri;

    # WebSocket proxy — MCX feed
    location /feed/mcx {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Keep WS connections alive
        proxy_read_timeout  86400s;  # 24h — WS stays open
        proxy_send_timeout  86400s;
        proxy_connect_timeout 10s;

        # No buffering for realtime
        proxy_buffering    off;
        proxy_cache        off;
    }

    # WebSocket proxy — FX feed
    location /feed/fx {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_buffering    off;
        proxy_cache        off;
    }

    # Legacy /feed path
    location /feed {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout  86400s;
        proxy_buffering    off;
    }

    # REST API endpoints — short timeout, gzip JSON responses
    location ~ ^/(rates|metrics|debug|ping|health|token-renew|updates) {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 10s;

        # Gzip for REST responses (not WS)
        gzip on;
        gzip_types application/json;
        gzip_min_length 256;
    }

    # Default — proxy everything else
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }
}

